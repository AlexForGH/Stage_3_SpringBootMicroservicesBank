input {
  # TCP вход для JSON логов от Spring Boot
  tcp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }
}

filter {
  if [type] == "spring-boot" {
    # Парсим timestamp
    date {
      match => [ "@timestamp", "ISO8601" ]
      target => "@timestamp"
    }

    # Добавляем поле с именем сервиса из MDC или из поля service
    if [service] {
      mutate {
        add_field => { "service_name" => "%{service}" }
      }
    } else if [mdc][service] {
      mutate {
        add_field => { "service_name" => "%{[mdc][service]}" }
      }
    } else {
      mutate {
        add_field => { "service_name" => "unknown" }
      }
    }

    # Извлекаем traceId из MDC для связи с Zipkin
    if [mdc][traceId] {
      mutate {
        add_field => { "trace_id" => "%{[mdc][traceId]}" }
      }
    }

    # Извлекаем spanId
    if [mdc][spanId] {
      mutate {
        add_field => { "span_id" => "%{[mdc][spanId]}" }
      }
    }

    # Удаляем служебные поля
    mutate {
      remove_field => ["@version", "host"]
    }
  }
}

output {
  # Вывод в консоль (для отладки)
  stdout {
    codec => rubydebug
  }

  # Отправляем логи в Elasticsearch
  elasticsearch {
    hosts => [ "${ELASTICSEARCH_URL}" ]
    index => "bank-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }
}