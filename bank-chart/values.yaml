global:
  serviceUrls:
    keycloak: "http://keycloak-service:8080"
    postgres: "postgres-service:5432"
    globalConfig: "http://bank-global-config-service:10000"
    cash: "http://bank-cash-service:10001"
    account: "http://bank-account-service:10002"
    transfer: "http://bank-transfer-service:10003"
    notification: "http://bank-notification-service:10004"
    frontUi: "http://bank-front-ui-service:30005"
    keycloakPublic: "http://localhost:30080"
    kafka: "bank-kafka-service:9092"
    zipkin: "http://bank-zipkin-service:9411"
    logstash: "bank-logstash-service:5000"
    elasticsearch: "http://bank-elasticsearch-service:9200"
    kibana: "http://bank-kibana-service:5601"
  exposure:
    keycloak:
      type: NodePort
      nodePort: 30080
    frontUi:
      type: NodePort
      nodePort: 30005
    zipkin:
      type: NodePort
      nodePort: 30411
    kibana:
      type: NodePort
      nodePort: 30601

keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-keycloak
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
    targetPort: 8080
    name: keycloak-service
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  probe:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 20

postgres:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-postgres
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 5432
    targetPort: 5432
    name: postgres-service
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 1Gi
  probe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5

kafka:
  enabled: true
  replicaCount: 1
  image:
    repository: bank-kafka
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 9092
    targetPort: 9092
    name: bank-kafka-service
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 512Mi
  probe:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 10

zipkin:
  enabled: true
  replicaCount: 1
  image:
