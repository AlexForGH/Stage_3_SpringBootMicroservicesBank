replicaCount: 1
image:
  repository: bank-notification
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 10004
  targetPort: 10004
  name: bank-notification-service
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
probe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 10
