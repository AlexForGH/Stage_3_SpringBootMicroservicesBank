replicaCount: 1
image:
  repository: bank-logstash
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 5000
  targetPort: 5000
  metricsPort: 9600
  metricsTargetPort: 9600
  name: bank-logstash-service
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "500m"
probe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10
