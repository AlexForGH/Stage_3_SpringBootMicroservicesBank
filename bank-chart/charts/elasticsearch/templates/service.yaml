apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels:
    app: elasticsearch
    release: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
    name: http
  - port: {{ .Values.service.transportPort }}
    targetPort: {{ .Values.service.transportTargetPort }}
    protocol: TCP
    name: transport
  selector:
    app: elasticsearch
    release: {{ .Release.Name }}
