apiVersion: v2
name: bank-chart
description: Bank microservices application
type: application
version: 0.1.0
appVersion: 1.0.0

dependencies:
  - name: keycloak
    version: 0.1.0
    condition: keycloak.enabled
  - name: postgres
    version: 0.1.0
    condition: postgres.enabled
  - name: global-config
    version: 0.1.0
    condition: global-config.enabled
  - name: cash
    version: 0.1.0
    condition: cash.enabled
  - name: account
    version: 0.1.0
    condition: account.enabled
  - name: transfer
    version: 0.1.0
    condition: transfer.enabled
  - name: notification
    version: 0.1.0
    condition: notification.enabled
  - name: front-ui
    version: 0.1.0
    condition: front-ui.enabled
